project=output
reads=$READS
genome_size=808000000
threads=$THREADS
cleanup=1
grid=local

prep_min_length=3000
prep_output_coverage=112

corr_iterate_number=1
corr_block_size=400000000000
corr_filter_options=--filter0=l=3000:al=2500:alr=0.5:aal=5000:ohr=0.3
corr_correct_options=--score=weight:lc=10 --aligner edlib --filter1=ohr=0.01
corr_rd2rd_options=-x ava-ont -k19 -f 0.005 -I400g -K400g -2
corr_output_coverage=88

align_block_size=400000000000
align_rd2rd_options=-X -g3000 -w30 -k19 -m100 -r20000 -f 0.001 -I400g -K400g -2
align_filter_options=--filter0=l=5000:aal=6000:aalr=0.5:ohr=0.3 --task=extend --filter1=ohr=0.03
asm1_assemble_options=--max_trivial_length 10000 --coverage=88 --min_contig_length 4000 --contig_format prialt

phase_method=1

phase_clair3_command=run_clair3.sh
phase_clair3_options=--platform=ont --model_path=/path/to/models/r941_prom_sup_g5014  --include_all_ctgs --chunk_size=10000000
phase_clair3_rd2ctg_options=-x map-ont -c --secondary=no --rmq=yes -r 1k,250k -K120g -2
phase_clair3_phase_options= --coverage lc=16 --phase_options icr=0.1:icc=6:sc=10 --filter i=70
phase_clair3_use_reads=0
phase_clair3_filter_options= --threshold=2500 --rate 0.05

asm2_assemble_options=--max_trivial_length 10000 --min_contig_length 4000 --contig_format dual,prialt

polish_map_options = -x map-ont -w10 -k19 -I40g -K120g -2
polish_use_reads=1
polish_cns_options =

polish_medaka = 1
polish_medaka_map_options = -x map-ont -w10 -k19 -K100g -2
polish_medaka_command = singularity exec -B `pwd -P`:`pwd -P` medaka_v1.7.2.sif medaka
polish_medaka_cns_options = --model r941_prom_sup_g507
